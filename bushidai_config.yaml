      usage: "Call when we always need to cut through bullshit with zero shame and maximum honest power."

    - name: "group / symbiosis / party"
      description: "Warm collective embrace where everyone belongs. Collaboration, shared joy, symbiosis that turns individuals into a living, breathing circle."
